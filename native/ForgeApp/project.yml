name: ForgeApp
options:
  bundleIdPrefix: com.buildly
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: false
    INFOPLIST_FILE: Info.plist

targets:
  Forge:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: ForgeApp
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buildly.forge
        PRODUCT_NAME: Forge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: true
        SUPPORTS_MACCATALYST: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          PROVISIONING_PROFILE_SPECIFIER: ""
          CODE_SIGN_ENTITLEMENTS: ForgeApp.debug.entitlements
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          CODE_SIGN_ENTITLEMENTS: ForgeApp.entitlements
