  <text x="64" y="39" text-anchor="middle" font-family="Orbitron, system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="2.5" fill="#e6eaf1">FORGE</text>
  <rect x="41" y="95" width="12" height="4" rx="2" fill="#4db6ff"/>
