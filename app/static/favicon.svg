<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Forge Communicator">
  <defs>
    <linearGradient id="body" x1="18" y1="10" x2="108" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a463f"/>
      <stop offset="0.48" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#1b2638"/>
    </linearGradient>
    <linearGradient id="screen" x1="38" y1="24" x2="90" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#0b0f17"/>
  <rect x="24" y="12" width="80" height="106" rx="24" fill="url(#body)" stroke="#e6eaf1" stroke-opacity="0.24" stroke-width="2"/>
  <rect x="38" y="28" width="52" height="58" rx="8" fill="url(#screen)" stroke="#4db6ff" stroke-opacity="0.34"/>
  <g>
    <rect x="45" y="60" width="6" height="3" rx="1.5" fill="#4db6ff"/>
    <rect x="54" y="52" width="3" height="19" rx="1.5" fill="#4db6ff"/>
    <rect x="62" y="46" width="3" height="31" rx="1.5" fill="#ffc857"/>
    <rect x="70" y="52" width="3" height="19" rx="1.5" fill="#4db6ff"/>
    <rect x="77" y="60" width="6" height="3" rx="1.5" fill="#4db6ff"/>
  </g>
  <text x="64" y="42" text-anchor="middle" font-family="monospace" font-size="7" font-weight="700" letter-spacing="1.1" fill="#e6eaf1">COMMS</text>
  <rect x="43" y="96" width="12" height="4" rx="2" fill="#4db6ff"/>
  <rect x="59" y="96" width="12" height="4" rx="2" fill="#ffc857"/>
  <rect x="75" y="96" width="12" height="4" rx="2" fill="#e6eaf1" fill-opacity="0.5"/>
