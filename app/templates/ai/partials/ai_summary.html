<div class="glass-dark border border-white/10 rounded-xl p-6">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-semibold text-white flex items-center space-x-2">
            <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span>Channel Summary</span>
        </h2>
        <span class="text-xs text-gray-500">Generated {{ now.strftime('%b %d at %I:%M %p') if now else 'just now' }}</span>
    </div>
    
    <div class="prose prose-invert max-w-none">
        {{ summary | safe }}
    </div>
    
    <div class="mt-6 pt-4 border-t border-white/10">
        <div class="flex items-center justify-between text-xs text-gray-500">
            <span>{{ message_count }} messages analyzed</span>
            <button onclick="navigator.clipboard.writeText(document.querySelector('.prose').innerText); this.textContent = 'Copied!'; setTimeout(() => this.textContent = 'Copy to clipboard', 2000);"
                    class="text-purple-400 hover:text-purple-300 inline-flex items-center space-x-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                </svg>
                <span>Copy to clipboard</span>
            </button>
        </div>
    </div>
</div>
